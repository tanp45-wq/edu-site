<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CGPA Calculator - EduHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    .calc-container { max-width: 900px; margin: 8rem auto 4rem; padding: 0 2rem; }
    .calc-header { text-align: center; margin-bottom: 3rem; }
    .calc-header h1 { font-family: 'Space Grotesk', sans-serif; font-size: 3rem; margin-bottom: 1rem; color: #fff; }
    
    .calc-tabs { display: flex; gap: 1rem; justify-content: center; margin-bottom: 3rem; }
    .calc-tab { 
      background: transparent; color: var(--text-dim); border: 1px solid var(--glass-border);
      padding: 0.8rem 1.5rem; border-radius: 50px; cursor: pointer; transition: 0.3s;
    }
    .calc-tab.active { background: var(--blue-b); color: #fff; border-color: var(--blue-b); }

    /* Semester Blocks */
    .semester-block {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: 20px; padding: 1.5rem; margin-bottom: 1.5rem; position: relative;
    }
    .sem-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .sem-title { font-size: 1.2rem; font-weight: 600; color: #fff; }
    .sem-sgpa { font-weight: bold; color: var(--blue-b); background: rgba(37,99,235,0.1); padding: 0.4rem 1rem; border-radius: 50px;}
    .del-sem { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 1.2rem; }
    
    .subject-row { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 1rem; margin-bottom: 0.8rem; }
    .calc-input {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      color: #fff; padding: 0.8rem; border-radius: 8px; width: 100%; outline: none;
    }
    .calc-input:focus { border-color: var(--blue-b); }
    .calc-input option { background: var(--navy); }
    .remove-row { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1.2rem; }
    
    .add-btn {
      background: rgba(255,255,255,0.05); color: #fff; border: 1px dashed rgba(255,255,255,0.3);
      padding: 0.8rem; width: 100%; border-radius: 8px; cursor: pointer; margin-top: 0.5rem; transition: 0.3s;
    }
    .add-btn:hover { background: rgba(255,255,255,0.1); border-color: #fff; }

    /* Grand Total */
    .cgpa-total {
      background: linear-gradient(135deg, var(--navy-light), var(--navy-mid));
      border: 1px solid var(--blue-b); border-radius: 20px; padding: 2rem;
      text-align: center; margin-top: 2rem; box-shadow: 0 10px 30px var(--blue-glow);
    }
    .cgpa-number { font-family: 'Space Grotesk', sans-serif; font-size: 4rem; font-weight: 800; color: #fff; margin: 1rem 0; }
  </style>
</head>
<body>
  <nav id="navbar" class="navbar">
    <div class="nav-inner">
      <div class="logo"><a href="./index.html" style="color:inherit;text-decoration:none">eduhub<span>vit</span></a></div>
      <ul class="nav-links" id="navLinks">
        <li><a href="./cgpa-calculator.html" class="active">Calculator</a></li>
        <li><a href="./nptel.html">NPTEL</a></li>
        <li><a href="./ffcs.html">FFCS</a></li>
        <li><a href="./reviews.html">Reviews</a></li>
        <li><a href="./messit.html">MessIt</a></li>
      </ul>
    </div>
  </nav>

  <div class="calc-container">
    <div class="calc-header reveal">
      <h1>Advanced CGPA Calculator</h1>
      <p style="color:var(--text-dim)">Accurate semester-wise tracking</p>
    </div>

    <div class="calc-tabs reveal">
      <button class="calc-tab active" onclick="switchMainTab('cgpa')">CGPA Calculator</button>
      <button class="calc-tab" onclick="switchMainTab('target')">Target GPA</button>
      <button class="calc-tab" onclick="switchMainTab('converter')">GPA ↔ %</button>
    </div>

    <!-- MAIN CGPA CALCULATOR -->
    <div id="cgpa-section" class="reveal">
      <div id="semesters-container">
        <!-- Semesters injected here -->
      </div>
      <button class="add-btn" style="margin-bottom: 2rem; border-color: var(--blue-b); color: var(--blue-b);" onclick="addSemester()">+ Add New Semester</button>

      <div class="cgpa-total">
        <h3 style="color:var(--text-dim);font-weight:500">Overall CGPA</h3>
        <div class="cgpa-number" id="final-cgpa">0.00</div>
        <p style="color:var(--text-dim)" id="final-credits">Total Credits: 0</p>
      </div>
    </div>

    <!-- TARGET GPA -->
    <div id="target-section" class="reveal" style="display: none;">
      <div class="semester-block">
        <h3 style="margin-bottom:1.5rem;color:#fff">Calculate Required GPA</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">
          <input type="number" id="current-cgpa" class="calc-input" placeholder="Current CGPA" oninput="computeRequired()" />
          <input type="number" id="completed-credits" class="calc-input" placeholder="Credits Completed" oninput="computeRequired()" />
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem">
          <input type="number" id="target-cgpa" class="calc-input" placeholder="Target CGPA" oninput="computeRequired()" />
          <input type="number" id="remaining-credits" class="calc-input" placeholder="Remaining Credits" oninput="computeRequired()" />
        </div>
        <div class="cgpa-total" style="padding:1.5rem">
          <h3 style="color:var(--text-dim)">Required GPA for Remaining Credits</h3>
          <div class="cgpa-number" style="font-size:3rem" id="required-gpa">--</div>
          <p id="gpa-advice" style="color:#fff"></p>
        </div>
      </div>
    </div>

    <!-- CONVERTER -->
    <div id="converter-section" class="reveal" style="display: none;">
      <div class="semester-block text-center">
        <h3 style="margin-bottom:1.5rem;color:#fff">GPA to Percentage Converter</h3>
        <div class="calc-tabs" style="margin-bottom:1.5rem">
          <button class="calc-tab active" id="tab-gpa" onclick="switchConvTab('gpa')">GPA to %</button>
          <button class="calc-tab" id="tab-pct" onclick="switchConvTab('pct')">% to GPA</button>
        </div>

        <div id="gpa-to-pct">
          <input type="number" id="input-gpa" class="calc-input" style="max-width:300px;margin:0 auto;display:block" placeholder="Enter GPA (e.g. 8.5)" oninput="convertGPA()" />
          <div class="cgpa-number" id="output-pct" style="font-size:3rem">--</div>
        </div>

        <div id="pct-to-gpa" style="display:none">
          <input type="number" id="input-pct" class="calc-input" style="max-width:300px;margin:0 auto;display:block" placeholder="Enter Percentage (e.g. 80)" oninput="convertPct()" />
          <div class="cgpa-number" id="output-gpa" style="font-size:3rem">--</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./js/calculator.js"></script>
</body>
</html>
