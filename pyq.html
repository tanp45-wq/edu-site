<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduHub — Exam Paper Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    ::selection{background:var(--blue);color:var(--white)}
    :root {
      --navy:#0D1B2A; --blue:#2563EB; --blue-b:#3B82F6; --cyan:#06B6D4;
      --white:#F0F6FF; --dim:rgba(176,200,230,.7); --gb:rgba(255,255,255,.11);
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--white); overflow-x: hidden; }
    .sec { padding: 4rem 2.5rem; max-width: 1200px; margin: 0 auto; }
    .sec-label { font-size: .72rem; letter-spacing: 3px; text-transform: uppercase; color: var(--blue-b); font-weight: 600; }
    .sec-title { font-family: 'Syne', sans-serif; font-size: clamp(2rem, 4vw, 3rem); font-weight: 700; margin-bottom: 3rem; }
    .filter-bar { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 3rem; align-items: center; background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 20px; border: 1px solid var(--gb); }
    .logo { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); display: inline-block; }
    .search-box { flex: 1; min-width: 300px; background: rgba(255,255,255,0.05); border: 1px solid var(--gb); padding: .8rem 1.2rem; border-radius: 12px; color: #fff; outline: none; transition: border-color 0.3s cubic-bezier(.4,0,.2,1), box-shadow 0.3s cubic-bezier(.4,0,.2,1), background-color 0.3s cubic-bezier(.4,0,.2,1); }
    .search-box:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.35); }
    .filter-select { background: var(--navy); color: #fff; border: 1px solid var(--gb); padding: .8rem; border-radius: 12px; outline: none; cursor: pointer; transition: border-color 0.3s cubic-bezier(.4,0,.2,1), box-shadow 0.3s cubic-bezier(.4,0,.2,1), background-color 0.3s cubic-bezier(.4,0,.2,1); }
    .filter-select:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.35); }
    .paper-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
    .paper-card { background: rgba(255,255,255,0.04); border: 1px solid var(--gb); border-radius: 20px; padding: 1.5rem; transition: .3s; }
    
    /* BACK TO TOP ENHANCED */
    .paper-card:hover { transform: translateY(-5px); border-color: var(--blue-b); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .p-tag { font-size: .65rem; font-weight: 800; padding: .3rem .7rem; border-radius: 50px; text-transform: uppercase; margin-bottom: 1rem; display: inline-block; }
    .tag-fat { background: rgba(239, 68, 68, 0.2); color: #f87171; }
    .tag-cat { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
    .btn-download { display: block; width: 100%; text-align: center; background: var(--blue); color: #fff; padding: .7rem; border-radius: 10px; text-decoration: none; font-weight: 600; margin-top: 1rem; transition: .2s; }
    .btn-download:hover { background: var(--blue-b); }

    /* PREVIEW MODAL */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 2rem; transition: opacity 0.3s; }
    .modal.open { display: flex; }
    .modal-content { background: var(--navy); border: 1px solid var(--gb); border-radius: 24px; width: 100%; max-width: 1000px; height: 90vh; display: flex; flex-direction: column; overflow: hidden; position: relative; }
    .modal-header { padding: 1.5rem 2rem; border-bottom: 1px solid var(--gb); display: flex; justify-content: space-between; align-items: center; }
    .modal-close { background: transparent; border: none; color: var(--white); font-size: 1.5rem; cursor: pointer; }
    .preview-frame { flex: 1; border: none; background: #fff; }

    #back-to-top {
      position: fixed; bottom: 2rem; right: 2rem; width: 50px; height: 50px;
      background: var(--navy); color: #fff; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 1000; opacity: 0; visibility: hidden;
      transform: scale(0.8); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: 1px solid var(--gb); font-size: 1.2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }
    #back-to-top.visible { opacity: 1; visibility: visible; transform: scale(1); }
    #back-to-top::before {
      content: ''; position: absolute; inset: -2px; border-radius: 50%;
      background: conic-gradient(var(--blue-b) var(--progress, 0%), transparent 0);
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #fff 0);
      mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #fff 0);
    }
    #back-to-top:hover { background: var(--navy-light); border-color: var(--blue-b); transform: scale(1.1) rotate(-10deg); }
  </style>
</head>
<body>

<nav class="navbar" style="position: relative; background: transparent; border: none;">
  <div class="nav-inner">
    <a href="./eduhub.html" class="logo">Edu<span>Hub</span></a>
    <ul class="nav-links">
      <li><a href="./eduhub.html">Home</a></li>
    </ul>
  </div>
</nav>

<section class="sec">
  <p class="sec-label">Resource Vault</p>
  <h2 class="sec-title">Solved VIT Papers</h2>

  <div class="filter-bar">
    <input type="text" id="paperSearch" class="search-box" placeholder="🔍 Search Course Name or Code (e.g. CSE1001)..." />
    <select id="examFilter" class="filter-select">
      <option value="all">All Exams</option>
      <option value="CAT 1">CAT 1</option>
      <option value="CAT 2">CAT 2</option>
      <option value="FAT">FAT</option>
    </select>
    <select id="deptFilter" class="filter-select">
      <option value="all">All Departments</option>
      <option value="SCOPE">SCOPE (CS)</option>
      <option value="SITE">SITE (IT)</option>
      <option value="SENSE">SENSE (ECE)</option>
      <option value="SELECT">SELECT (EEE)</option>
      <option value="SAS">SAS (Basic Sci)</option>
    </select>
    <select id="sortOrder" class="filter-select">
      <option value="desc">Year: Newest First</option>
      <option value="asc">Year: Oldest First</option>
    </select>
  </div>

  <div id="paperGrid" class="paper-grid">
    <!-- Dynamic content -->
  </div>
</section>

<script>
  // Minimal background animation to maintain premium feel
  (function initBg() {
    const canvas = document.createElement('canvas');
    canvas.style.position = 'fixed';
    canvas.style.inset = '0';
    canvas.style.zIndex = '-1';
    document.body.appendChild(canvas);
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 5;

    const geometry = new THREE.IcosahedronGeometry(2, 0);
    const material = new THREE.MeshPhongMaterial({ color: 0x2563EB, wireframe: true, opacity: 0.1, transparent: true });
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);
    scene.add(new THREE.AmbientLight(0x404040));
    scene.add(new THREE.PointLight(0xffffff, 1, 100).clone().set(5, 5, 5));

    function animate() {
      requestAnimationFrame(animate);
      mesh.rotation.x += 0.001;
      mesh.rotation.y += 0.002 + (window.scrollY * 0.00005);
      mesh.position.y = window.scrollY * 0.002; // Vertical parallax drift
      renderer.render(scene, camera);
    }
    function resize() {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', resize);
    resize(); animate();
  })();
</script>

<script defer src="./js/main.js"></script>
<script defer src="./js/pyq.js"></script>

<div id="back-to-top" title="Back to top">↑</div>

<div id="previewModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="previewTitle" style="font-family:'Syne'">Paper Preview</h3>
      <button class="modal-close" onclick="closePreview()">✕</button>
    </div>
    <iframe id="previewFrame" class="preview-frame" src=""></iframe>
  </div>
</div>

</body>
</html>
