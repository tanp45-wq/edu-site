<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NPTEL Course Browser - EduHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    .nptel-container { max-width: 1200px; margin: 8rem auto 4rem; padding: 0 2rem; }
    .nptel-header { text-align: center; margin-bottom: 3rem; }
    .nptel-header h1 { font-family: 'Space Grotesk', sans-serif; font-size: 3rem; margin-bottom: 1rem; color: #fff; }
    
    .search-bar { max-width: 600px; margin: 0 auto 3rem; position: relative; }
    .search-input { 
      width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
      color: #fff; padding: 1.2rem 1.5rem 1.2rem 3rem; border-radius: 50px; outline: none; font-size: 1.1rem;
    }
    .search-input:focus { border-color: var(--blue-b); }
    .search-icon { position: absolute; left: 1.2rem; top: 50%; transform: translateY(-50%); font-size: 1.2rem; }

    .filters { display: flex; gap: 1rem; justify-content: center; margin-bottom: 3rem; flex-wrap: wrap; }
    .filter-btn { 
      background: transparent; border: 1px solid var(--glass-border); color: var(--text-dim);
      padding: 0.6rem 1.5rem; border-radius: 50px; cursor: pointer; transition: 0.3s;
    }
    .filter-btn.active { background: var(--blue-b); color: #fff; border-color: var(--blue-b); }
    
    .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
    
    .course-card {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: 20px; padding: 1.5rem; transition: transform 0.3s, box-shadow 0.3s;
      display: flex; flex-direction: column; height: 100%;
    }
    .course-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.2); }
    
    .course-tag { font-size: 0.75rem; padding: 0.3rem 0.8rem; border-radius: 50px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1rem; align-self: flex-start; }
    .tag-cs { background: rgba(37,99,235,0.1); color: #60a5fa; border: 1px solid rgba(96,165,250,0.3); }
    .tag-math { background: rgba(139,92,246,0.1); color: #a78bfa; border: 1px solid rgba(167,139,250,0.3); }
    .tag-ee { background: rgba(16,185,129,0.1); color: #34d399; border: 1px solid rgba(52,211,153,0.3); }
    .tag-mech { background: rgba(245,158,11,0.1); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
    
    .course-title { font-size: 1.25rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; line-height: 1.4; }
    .course-inst { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 1.5rem; }
    
    .course-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-top: auto; border-top: 1px solid var(--glass-border); padding-top: 1rem; }
    .stat-item { display: flex; flex-direction: column; }
    .stat-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 0.2rem; }
    .stat-value { font-weight: 600; color: #fff; font-size: 0.9rem; }
    
    .action-bar { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .action-btn { flex: 1; padding: 0.6rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: 0.2s; text-align: center; text-decoration: none; }
    .btn-pyq { background: rgba(37,99,235,0.1); color: #60a5fa; border-color: rgba(96,165,250,0.3); }
    .btn-pyq:hover { background: #2563eb; color: #fff; }
    .btn-pyq.disabled { opacity: 0.5; pointer-events: none; }
  </style>
</head>
<body>
  <nav id="navbar" class="navbar">
    <div class="nav-inner">
      <div class="logo"><a href="./index.html" style="color:inherit;text-decoration:none">eduhub<span>vit</span></a></div>
      <ul class="nav-links" id="navLinks">
        <li><a href="./cgpa-calculator.html">Calculator</a></li>
        <li><a href="./nptel.html" class="active">NPTEL</a></li>
        <li><a href="./ffcs.html">FFCS</a></li>
        <li><a href="./reviews.html">Reviews</a></li>
        <li><a href="./messit.html">MessIt</a></li>
      </ul>
    </div>
  </nav>

  <div class="nptel-container">
    <div class="nptel-header reveal">
      <h1>NPTEL Hub</h1>
      <p style="color:var(--text-dim)">Access course data, materials, and PYQs</p>
    </div>

    <div class="search-bar reveal">
      <span class="search-icon">🔍</span>
      <input type="text" id="nptel-search" class="search-input" placeholder="Search for courses..." oninput="renderCourses()" />
    </div>

    <div class="filters reveal" id="nptel-filters">
      <button class="filter-btn active" data-filter="All">All Courses</button>
      <button class="filter-btn" data-filter="CS">Computer Science</button>
      <button class="filter-btn" data-filter="Math">Mathematics</button>
      <button class="filter-btn" data-filter="Electrical">Electrical</button>
      <button class="filter-btn" data-filter="Mechanical">Mechanical</button>
    </div>

    <div class="course-grid" id="course-grid">
      <!-- Loading state -->
      <div style="color:var(--text-dim); text-align:center; grid-column: 1 / -1;">Loading course data...</div>
    </div>
  </div>

  <script src="./js/nptel.js"></script>
</body>
</html>
