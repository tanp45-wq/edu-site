<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MessIt - VIT Mess Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    .mess-container { max-width: 900px; margin: 8rem auto 4rem; padding: 0 2rem; }
    .mess-header { text-align: center; margin-bottom: 3rem; }
    .mess-header h1 { font-family: 'Space Grotesk', sans-serif; font-size: 3.5rem; margin-bottom: 1rem; color: #fff; }
    .mess-header h1 span { color: var(--blue-b); }
    .mess-controls { display: flex; gap: 1rem; justify-content: center; margin-bottom: 3rem; flex-wrap: wrap; }
    .mess-select { 
      background: var(--glass-bg); border: 1px solid var(--glass-border); color: #fff; 
      padding: 0.8rem 1.5rem; border-radius: 12px; font-size: 1rem; cursor: pointer; outline: none; backdrop-filter: blur(10px);
    }
    .mess-select option { background: var(--navy); color: #fff; }
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .meal-card { 
      background: var(--glass-bg); border: 1px solid var(--glass-border); 
      border-radius: 20px; padding: 2rem; position: relative; overflow: hidden; transition: all 0.3s;
    }
    .meal-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.2); }
    .active-meal { border-color: var(--blue-b); box-shadow: 0 0 20px var(--blue-glow); }
    .active-meal::before {
      content: 'NOW'; position: absolute; top: 1rem; right: 1rem;
      background: var(--blue-b); color: #fff; font-size: 0.7rem; font-weight: bold;
      padding: 0.3rem 0.6rem; border-radius: 20px;
    }
    .meal-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: #fff; display: flex; align-items: center; gap: 0.5rem; }
    .meal-time { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 1.5rem; display: block; }
    .menu-items { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .menu-item-tag { 
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      padding: 0.5rem 1rem; border-radius: 50px; font-size: 0.9rem; color: var(--text-dim);
    }
    @media (max-width: 768px) { .menu-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav id="navbar" class="navbar">
    <div class="nav-inner">
      <div class="logo"><a href="./index.html" style="color:inherit;text-decoration:none">eduhub<span>vit</span></a></div>
      <ul class="nav-links" id="navLinks">
        <li><a href="./cgpa-calculator.html">Calculator</a></li>
        <li><a href="./nptel.html">NPTEL</a></li>
        <li><a href="./ffcs.html">FFCS</a></li>
        <li><a href="./reviews.html">Reviews</a></li>
        <li><a href="./messit.html" class="active">MessIt</a></li>
      </ul>
    </div>
  </nav>

  <div class="mess-container">
    <div class="mess-header">
      <h1>Mess<span>It</span></h1>
      <p style="color:var(--text-dim);font-size:1.1rem" id="today-date">Loading...</p>
    </div>

    <div class="mess-controls">
      <select id="mess-select" class="mess-select">
        <option value="Special">Special Mess</option>
        <option value="Non-Veg">Non-Veg Mess</option>
        <option value="Veg">Veg Mess</option>
      </select>
      <select id="day-select" class="mess-select">
        <option value="Monday">Monday</option>
        <option value="Tuesday">Tuesday</option>
        <option value="Wednesday">Wednesday</option>
        <option value="Thursday">Thursday</option>
        <option value="Friday">Friday</option>
        <option value="Saturday">Saturday</option>
        <option value="Sunday">Sunday</option>
      </select>
    </div>

    <div class="menu-grid">
      <!-- Breakfast -->
      <div class="meal-card" id="card-breakfast">
        <div class="meal-title">🥞 Breakfast</div>
        <span class="meal-time">07:30 AM - 09:00 AM</span>
        <div class="menu-items" id="menu-breakfast">Loading...</div>
      </div>
      
      <!-- Lunch -->
      <div class="meal-card" id="card-lunch">
        <div class="meal-title">🍛 Lunch</div>
        <span class="meal-time">12:30 PM - 02:30 PM</span>
        <div class="menu-items" id="menu-lunch">Loading...</div>
      </div>

      <!-- Snacks -->
      <div class="meal-card" id="card-snacks">
        <div class="meal-title">☕ Snacks</div>
        <span class="meal-time">05:00 PM - 06:15 PM</span>
        <div class="menu-items" id="menu-snacks">Loading...</div>
      </div>

      <!-- Dinner -->
      <div class="meal-card reveal" id="card-dinner">
        <div class="meal-title">🍲 Dinner</div>
        <span class="meal-time">07:30 PM - 09:00 PM</span>
        <div class="menu-items" id="menu-dinner">Loading...</div>
      </div>
    </div>
  </div>

  <script src="./js/main.js"></script>
  <script src="./js/mess.js"></script>
</body>
</html>
